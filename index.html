<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Claw">
    <meta name="theme-color" content="#007AFF">
    <title>Claw - AI Assistant</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #007AFF; --bg: #000000; --surface: #1C1C1E; --surface2: #2C2C2E; --text: #FFFFFF; --text2: #8E8E93; --success: #30D158; --error: #FF453A; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 60px 20px 20px; background: var(--bg); border-bottom: 1px solid var(--surface2); }
        .header h1 { font-size: 34px; font-weight: 700; }
        .header p { color: var(--text2); font-size: 15px; margin-top: 4px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { text-align: right; }
        .message-bubble { display: inline-block; padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 16px; line-height: 1.4; white-space: pre-wrap; }
        .message.user .message-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .message.assistant .message-bubble { background: var(--surface); border-bottom-left-radius: 4px; }
        .input-container { padding: 12px 20px 40px; background: var(--bg); border-top: 1px solid var(--surface2); }
        .input-wrapper { display: flex; align-items: center; background: var(--surface); border-radius: 22px; padding: 4px; }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 16px; padding: 12px 16px; outline: none; }
        .input-wrapper input::placeholder { color: var(--text2); }
        .send-btn { background: var(--primary); border: none; border-radius: 20px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .send-btn svg { width: 20px; height: 20px; fill: white; }
        .tools-section { padding: 0 20px 20px; flex-shrink: 0; }
        .tools-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; margin-bottom: 12px; }
        .tools-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .tool-item { background: var(--surface); padding: 14px; border-radius: 12px; cursor: pointer; }
        .tool-item h4 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
        .tool-item p { font-size: 12px; color: var(--text2); }
        .loading { display: flex; gap: 4px; padding: 12px 16px; }
        .loading span { width: 8px; height: 8px; background: var(--text2); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .api-key-section { padding: 0 20px 16px; }
        .api-key-input { background: var(--surface); padding: 14px; border-radius: 12px; }
        .api-key-input label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 8px; }
        .api-key-input input { width: 100%; background: var(--surface2); border: none; color: var(--text); font-size: 14px; padding: 10px 12px; border-radius: 8px; margin-bottom: 8px; }
        .api-key-input button { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; width: 100%; }
        .api-key-input button.saved { background: var(--success); }
        .status { font-size: 12px; margin-top: 8px; color: var(--text2); min-height: 16px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header"><h1>Claw</h1><p>AI Assistant (testo)</p></div>
        <div class="chat-container" id="chat">
        </div>
        <div class="tools-section">
            <div class="tools-title">Strumenti Finanziari</div>
            <div class="tools-grid">
                <div class="tool-item" onclick="useTool('stock')"><h4>📈 Stock</h4><p>Goldman</p></div>
                <div class="tool-item" onclick="useTool('dcf')"><h4>💰 DCF</h4><p>Morgan</p></div>
                <div class="tool-item" onclick="useTool('risk')"><h4>⚠️ Rischio</h4><p>Bridgewater</p></div>
                <div class="tool-item" onclick="useTool('technical')"><h4>📊 Tech</h4><p>Citadel</p></div>
                <div class="tool-item" onclick="useTool('portfolio')"><h4>💼 Portafoglio</h4><p>BlackRock</p></div>
                <div class="tool-item" onclick="useTool('earnings')"><h4>📋 Earnings</h4><p>JPMorgan</p></div>
            </div>
        </div>
        <div class="api-key-section">
            <div class="api-key-input">
                <label>API Key (testo)</label>
                <input type="password" id="apiKey" placeholder="sk-ant-api... o gsk_...">
                <button onclick="testApiKey()" id="apiKeyBtn">Test connessione</button>
                <div class="status" id="status"></div>
            </div>
        </div>
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Scrivi in testo..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
            </div>
        </div>
    </div>
    <script>
        const ANTHROPIC_API = 'https://api.anthropic.com/v1/messages';
        const GROQ_API = 'https://api.groq.com/openai/v1/chat/completions';
        
        let apiKey = '';
        let testResult = false;
        let conversation = [];
        
        const responses = {
            'stock': '📈 Stock Screener\nTicker, settore, criteri',
            'dcf': '💰 DCF\nTicker, proiezioni',
            'risk': '⚠️ Rischio\nPosizioni, capitale',
            'technical': '📊 Technical\nTicker, timeframe',
            'portfolio': '💼 Portafoglio\nCapitale, obiettivi',
            'earnings': '📋 Earnings\nTicker, data'
        };
        
        function log(msg) {
            document.getElementById('status').textContent = msg;
        }
        
        function addMessage(content, isUser = false) {
            const chat = document.getElementById('chat');
            chat.innerHTML += '<div class="message ' + (isUser ? 'user' : 'assistant') + '"><div class="message-bubble">' + content + '</div></div>';
            chat.scrollTop = chat.scrollHeight;
        }
        
        function showTyping() {
            const chat = document.getElementById('chat');
            chat.innerHTML += '<div class="message assistant" id="typing"><div class="loading"><span></span><span></span><span></span></div></div>';
            chat.scrollTop = chat.scrollHeight;
        }
        
        function hideTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }
        
        async function testApiKey() {
            const inputKey = document.getElementById('apiKey').value.trim();
            if (inputKey) {
                apiKey = inputKey;
                localStorage.setItem('claw_api_key', apiKey);
            } else {
                apiKey = localStorage.getItem('claw_api_key') || '';
            }
            
            if (!apiKey) {
                log('Inserisci API Key');
                return;
            }
            
            log('Test...');
            
            try {
                let response;
                if (apiKey.startsWith('sk-ant-')) {
                    response = await callAnthropic('OK');
                } else if (apiKey.startsWith('gsk_')) {
                    response = await callGroq('OK');
                } else {
                    response = await callAnthropic('OK');
                }
                
                testResult = true;
                conversation = [{role: 'user', content: 'Sei Claw. Rispondi in italiano.'}];
                document.getElementById('apiKeyBtn').textContent = '✓ Connesso!';
                document.getElementById('apiKeyBtn').classList.add('saved');
                log('OK! Scrivi.');
                addMessage('Ciao! 👋 AI attiva.', false);
            } catch (e) {
                testResult = false;
                log('Errore: ' + e.message);
            }
        }
        
        async function callAnthropic(msg) {
            const res = await fetch(ANTHROPIC_API, {
                method: 'POST',
                headers: {
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'claude-3-haiku-20240307',
                    max_tokens: 512,
                    messages: [...conversation, {role: 'user', content: msg}]
                })
            });
            
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error?.message || 'HTTP ' + res.status);
            }
            
            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            return data.content[0].text;
        }
        
        async function callGroq(msg) {
            const res = await fetch(GROQ_API, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + apiKey,
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'llama-3-70b-8192',
                    messages: [...conversation, {role: 'user', content: msg}],
                    max_tokens: 512
                })
            });
            
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error?.message || 'HTTP ' + res.status);
            }
            
            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            return data.choices[0].message.content;
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) return;
            
            if (!testResult) {
                addMessage('Testa prima API con pulsante', false);
                return;
            }
            
            addMessage(content, true);
            input.value = '';
            showTyping();
            
            try {
                let response;
                conversation.push({role: 'user', content});
                
                if (apiKey.startsWith('sk-ant-')) {
                    response = await callAnthropic(content);
                } else {
                    response = await callGroq(content);
                }
                
                hideTyping();
                addMessage(response, false);
                conversation.push({role: 'assistant', content: response});
            } catch (e) {
                hideTyping();
                addMessage('Errore: ' + e.message, false);
            }
        }
        
        function useTool(tool) {
            addMessage('→ ' + tool.toUpperCase(), true);
            setTimeout(function() { addMessage(responses[tool]); }, 300);
        }
        
        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
        
        const savedKey = localStorage.getItem('claw_api_key');
        if (savedKey) {
            document.getElementById('apiKey').value = savedKey.substring(0, 15) + '...';
            apiKey = savedKey;
        }
        
        addMessage('Ciao! Scrivi solo testo, no immagini.\n\n1. Inserisci API Key\n2. Test connessione\n3. Scrivi', false);
    </script>
</body>
</html>
