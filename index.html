<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#007AFF">
    <title>Claw</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --p: #007AFF; --bg: #000; --s: #1C1C1E; --s2: #2C2C2E; --t: #FFF; --t2: #8E8E93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--t); height: 100vh; overflow: hidden; }
        
        .sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--s); transition: right .3s; z-index: 100; padding: 80px 20px; overflow-y: auto; }
        .sidebar.open { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 99; }
        .overlay.show { opacity: 1; pointer-events: auto; }
        
        .header { padding: 60px 20px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 34px; font-weight: 700; }
        .menu-btn { background: var(--s); border: none; padding: 12px; border-radius: 12px; cursor: pointer; }
        .menu-btn svg { width: 24px; height: 24px; fill: var(--t); }
        
        .tool-item { background: var(--s2); padding: 16px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
        .tool-item h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .tool-item p { font-size: 12px; color: var(--t2); }
        
        .chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 20px; animation: fadeIn .3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        .msg.user { text-align: right; }
        .bubble { display: inline-block; padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 16px; white-space: pre-wrap; }
        .msg.user .bubble { background: var(--p); color: white; border-bottom-right-radius: 4px; }
        .msg.assistant .bubble { background: var(--s); border-bottom-left-radius: 4px; }
        
        .input-area { padding: 12px 20px 40px; border-top: 1px solid var(--s2); }
        .input-wrap { display: flex; align-items: center; background: var(--s); border-radius: 22px; padding: 4px; }
        .input-wrap input { flex: 1; background: transparent; border: none; color: var(--t); font-size: 16px; padding: 12px 16px; outline: none; }
        .send-btn { background: var(--p); border: none; border-radius: 20px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .send-btn svg { width: 20px; height: 20px; fill: white; }
        
        .dots { display: flex; gap: 4px; padding: 12px 16px; }
        .dots span { width: 8px; height: 8px; background: var(--t2); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dots span:nth-child(1) { animation-delay: -.32s; }
        .dots span:nth-child(2) { animation-delay: -.16s; }
        @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
        
        .api-sec { padding: 0 20px 16px; }
        .api-box { background: var(--s); padding: 14px; border-radius: 12px; }
        .api-box label { display: block; font-size: 13px; color: var(--t2); margin-bottom: 8px; }
        .api-box input { width: 100%; background: var(--s2); border: none; color: var(--t); font-size: 14px; padding: 10px 12px; border-radius: 8px; margin-bottom: 8px; }
        .api-box button { background: var(--p); color: white; border: none; padding: 10px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; width: 100%; }
        .api-box button.ok { background: #30D158; }
        .status { font-size: 12px; margin-top: 8px; color: var(--t2); }
    </style>
</head>
<body>
    <div class="overlay" onclick="toggle()"></div>
    
    <div class="sidebar" id="sidebar">
        <div style="font-size:18px;font-weight:600;margin-bottom:20px;">Strumenti</div>
        <div class="tool-item" onclick="use('stock')"><h4>📈 Stock</h4><p>Goldman</p></div>
        <div class="tool-item" onclick="use('dcf')"><h4>💰 DCF</h4><p>Morgan</p></div>
        <div class="tool-item" onclick="use('risk')"><h4>⚠️ Rischio</h4><p>Bridgewater</p></div>
        <div class="tool-item" onclick="use('tech')"><h4>📊 Tech</h4><p>Citadel</p></div>
        <div class="tool-item" onclick="use('port')"><h4>💼 Portafoglio</h4><p>BlackRock</p></div>
        <div class="tool-item" onclick="use('earn')"><h4>📋 Earnings</h4><p>JPMorgan</p></div>
    </div>
    
    <div style="display:flex;flex-direction:column;height:100vh;">
        <div class="header">
            <h1>Claw</h1>
            <button class="menu-btn" onclick="toggle()">
                <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
        </div>
        
        <div class="chat" id="chat">
        </div>
        
        <div class="api-sec">
            <div class="api-box">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="sk-ant...">
                <button onclick="testApi()" id="apiBtn">Test</button>
                <div class="status" id="status"></div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-wrap">
                <input type="text" id="msgInput" placeholder="Scrivi..." onkeypress="if(e.key==='Enter')send()">
                <button class="send-btn" onclick="send()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>
    
    <script>
        const API_ANTHROPIC = 'https://api.anthropic.com/v1/messages';
        const API_GROQ = 'https://api.groq.com/openai/v1/chat/completions';
        
        let key = '';
        let ok = false;
        let conv = [];
        
        const reps = { stock:'S: Ticker, settore', dcf:'D: Ticker', risk:'R: Posizioni', tech:'T: Ticker', port:'P: Capitale', earn:'E: Ticker' };
        
        function toggle() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.overlay').classList.toggle('show');
        }
        
        function log(m) { document.getElementById('status').textContent = m; }
        
        function add(m, u) {
            const c = document.getElementById('chat');
            c.innerHTML += '<div class="msg ' + (u?'user':'assistant') + '"><div class="bubble">' + m + '</div></div>';
            c.scrollTop = c.scrollHeight;
        }
        
        function showLoad() {
            const c = document.getElementById('chat');
            c.innerHTML += '<div class="msg assistant" id="load"><div class="dots"><span></span><span></span></div></div>';
            c.scrollTop = c.scrollHeight;
        }
        
        function hideLoad() { var t=document.getElementById('load'); if(t)t.remove(); }
        
        async function testApi() {
            const k = document.getElementById('apiKey').value.trim();
            if(k) { key = k; localStorage.setItem('claw_key', k); }
            else { key = localStorage.getItem('claw_key') || ''; }
            
            if(!key) { log('Inserisci key'); return; }
            
            log('Test...');
            
            try {
                let r;
                if(key.startsWith('sk-ant-')) r = await callAnthropic('OK');
                else if(key.startsWith('gsk_')) r = await callGroq('OK');
                else r = await callAnthropic('OK');
                
                ok = true;
                conv = [{role:'user',content:'Rispondi it.'}];
                document.getElementById('apiBtn').textContent = '✓ OK';
                document.getElementById('apiBtn').classList.add('ok');
                log('OK!');
                add('Ciao! 👋', false);
            } catch(e) {
                ok = false;
                log('Err: '+e.message);
            }
        }
        
        async function callAnthropic(msg) {
            const res = await fetch(API_ANTHROPIC, {
                method: 'POST',
                headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json' },
                body: JSON.stringify({ model: 'claude-3-haiku-20240307', max_tokens: 500, messages: [...conv,{role:'user',content:msg}] })
            });
            if(!res.ok) { const e=await res.json(); throw new Error(e.error?.message||'err'); }
            const d = await res.json();
            if(d.error) throw new Error(d.error.message);
            return d.content[0].text;
        }
        
        async function callGroq(msg) {
            const res = await fetch(API_GROQ, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer '+key, 'content-type': 'application/json' },
                body: JSON.stringify({ model: 'llama-3-70b-8192', messages: [...conv,{role:'user',content:msg}], max_tokens: 500 })
            });
            if(!res.ok) { const e=await res.json(); throw new Error(e.error?.message||'err'); }
            const d = await res.json();
            if(d.error) throw new Error(d.error.message);
            return d.choices[0].message.content;
        }
        
        async function send() {
            const txt = document.getElementById('msgInput').value.trim();
            if(!txt) return;
            if(!ok) { add('Testa prima API', false); return; }
            
            add(txt, true);
            document.getElementById('msgInput').value = '';
            showLoad();
            
            try {
                conv.push({role:'user',content:txt});
                let r;
                if(key.startsWith('sk-ant-')) r = await callAnthropic(txt);
                else r = await callGroq(txt);
                
                hideLoad();
                add(r, false);
                conv.push({role:'assistant',content:r});
            } catch(e) {
                hideLoad();
                add('Err: '+e.message, false);
            }
        }
        
        function use(tool) {
            toggle();
            add('→ '+tool.toUpperCase(), true);
            setTimeout(function(){ add(reps[tool]); }, 300);
        }
        
        localStorage.removeItem('claw_api_key');
        localStorage.removeItem('claw_key');
        
        const saved = localStorage.getItem('claw_key');
        if(saved) { document.getElementById('apiKey').value = saved.slice(0,15)+'...'; key = saved; }
        
        add('Ciao! Scrivi solo testo.\n1.Inserisci API Key\n2.Test\n3.Scrivi', false);
    </script>
</body>
</html>
