<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Claw">
    <meta name="theme-color" content="#007AFF">
    <title>Claw - AI Assistant</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #007AFF; --bg: #000000; --surface: #1C1C1E; --surface2: #2C2C2E; --text: #FFFFFF; --text2: #8E8E93; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 60px 20px 20px; background: var(--bg); border-bottom: 1px solid var(--surface2); }
        .header h1 { font-size: 34px; font-weight: 700; }
        .header p { color: var(--text2); font-size: 15px; margin-top: 4px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { text-align: right; }
        .message-bubble { display: inline-block; padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 16px; line-height: 1.4; white-space: pre-wrap; }
        .message.user .message-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .message.assistant .message-bubble { background: var(--surface); border-bottom-left-radius: 4px; }
        .input-container { padding: 12px 20px 40px; background: var(--bg); border-top: 1px solid var(--surface2); }
        .input-wrapper { display: flex; align-items: center; background: var(--surface); border-radius: 22px; padding: 4px; }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 16px; padding: 12px 16px; outline: none; }
        .input-wrapper input::placeholder { color: var(--text2); }
        .send-btn { background: var(--primary); border: none; border-radius: 20px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .send-btn svg { width: 20px; height: 20px; fill: white; }
        .tools-section { padding: 0 20px 20px; flex-shrink: 0; }
        .tools-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; margin-bottom: 12px; }
        .tools-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .tool-item { background: var(--surface); padding: 14px; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; }
        .tool-item:active { transform: scale(0.98); background: var(--surface2); }
        .tool-item h4 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
        .tool-item p { font-size: 12px; color: var(--text2); }
        .loading { display: flex; gap: 4px; padding: 12px 16px; }
        .loading span { width: 8px; height: 8px; background: var(--text2); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .api-key-input { background: var(--surface); padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; }
        .api-key-input label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 8px; }
        .api-key-input input { width: 100%; background: var(--surface2); border: none; color: var(--text); font-size: 14px; padding: 10px 12px; border-radius: 8px; }
        .api-key-input button { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 8px; margin-top: 8px; font-size: 14px; cursor: pointer; }
        .api-key-input button.saved { background: var(--success); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header"><h1>Claw</h1><p>AI Assistant</p></div>
        <div class="chat-container" id="chat">
        </div>
        <div class="tools-section">
            <div class="tools-title">Strumenti Finanziari</div>
            <div class="tools-grid">
                <div class="tool-item" onclick="useTool('stock')"><h4>📈 Stock Screener</h4><p>Goldman Sachs style</p></div>
                <div class="tool-item" onclick="useTool('dcf')"><h4>💰 DCF Valuation</h4><p>Morgan Stanley style</p></div>
                <div class="tool-item" onclick="useTool('risk')"><h4>⚠️ Risk Analysis</h4><p>Bridgewater style</p></div>
                <div class="tool-item" onclick="useTool('technical')"><h4>📊 Technical</h4><p>Citadel style</p></div>
                <div class="tool-item" onclick="useTool('portfolio')"><h4>💼 Portfolio</h4><p>BlackRock style</p></div>
                <div class="tool-item" onclick="useTool('earnings')"><h4>📋 Earnings</h4><p>JPMorgan style</p></div>
                <div class="tool-item" onclick="useTool('dividend')"><h4>💵 Dividendi</h4><p>Harvard style</p></div>
                <div class="tool-item" onclick="useTool('macro')"><h4>🌍 Macro</h4><p>McKinsey style</p></div>
            </div>
        </div>
        <div class="input-container">
            <div class="api-key-input">
                <label>API Key (opzionale per AI avanzata)</label>
                <input type="password" id="apiKey" placeholder="sk-ant-...">
                <button onclick="saveApiKey()" id="apiKeyBtn">Salva</button>
            </div>
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Scrivi un messaggio..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
            </div>
        </div>
    </div>
    <script>
        const ANTHROPIC_API = 'https://api.anthropic.com/v1/messages';
        const GROQ_API = 'https://api.groq.com/openai/v1/chat/completions';
        
        let apiKey = localStorage.getItem('claw_api_key') || '';
        let messages = [{role: 'user', content: 'Sei Claw, un assistente AI specializzato in analisi finanziaria. Rispondi in italiano.'}];
        
        const responses = {
            'stock': "📈 **Stock Screener - Goldman Sachs**\n\nPer analisi completa:\n• Ticker azione\n• Settore preferito\n• Criteri di screening\n\n*Invia i dettagli.*",
            'dcf': "💰 **DCF Valuation - Morgan Stanley**\n\nPer valutazione DCF:\n• Ticker azienda\n• Proiezioni finanziarie\n\n*Invia il nome.*",
            'risk': "⚠️ **Risk Analysis - Bridgewater**\n\nPer analisi rischio:\n• Posizioni attuali\n• Capitale totale\n\n*Invia i dettagli.*",
            'technical': "📊 **Technical Analysis - Citadel**\n\nPer analisi tecnica:\n• Ticker\n• Timeframe\n\n*Invia i dettagli.*",
            'portfolio': "💼 **Portfolio - BlackRock**\n\nPer costruire portafoglio:\n• Capitale disponibile\n• Obiettivi\n• Rischio\n\n*Invia i tuoi dati.*",
            'earnings': "📋 **Earnings - JPMorgan**\n\nPer analisi pre-earnings:\n• Ticker\n• Data earnings\n\n*Invia i dettagli.*",
            'dividend': "💵 **Dividend Portfolio - Harvard**\n\nPer portafoglio dividendi:\n• Capitale\n• Anni orizzonte\n\n*Invia i dettagli.*",
            'macro': "🌍 **Macro Analysis - McKinsey**\n\nPer analisi macro:\n• Portafoglio attuale\n• Focus geografico\n\n*Invia i dettagli.*"
        };
        
        function init() {
            if (apiKey) {
                document.getElementById('apiKey').value = apiKey.substring(0, 10) + '...';
                document.getElementById('apiKeyBtn').textContent = 'Salvata ✓';
                document.getElementById('apiKeyBtn').classList.add('saved');
            }
            addMessage("Ciao! Sono Claw, il tuo assistente AI finanziario.\n\nScegli uno strumento o scrivi cosa ti serve.", false);
        }
        
        function saveApiKey() {
            const input = document.getElementById('apiKey');
            const key = input.value.trim();
            if (key) {
                apiKey = key;
                localStorage.setItem('claw_api_key', key);
                input.value = key.substring(0, 10) + '...';
                document.getElementById('apiKeyBtn').textContent = 'Salvata ✓';
                document.getElementById('apiKeyBtn').classList.add('saved');
                addMessage("API key salvata! Usa l'AI avanzata.", false);
            }
        }
        
        function addMessage(content, isUser = false) {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="message ${isUser ? 'user' : 'assistant'}"><div class="message-bubble">${content}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }
        
        function showTyping() {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="message assistant" id="typing"><div class="loading"><span></span><span></span><span></span></div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }
        
        function hideTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }
        
        async function callAnthropic(userMsg) {
            const res = await fetch(ANTHROPIC_API, {
                method: 'POST',
                headers: {
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'claude-3-haiku-20240307',
                    max_tokens: 1024,
                    messages: [...messages, {role: 'user', content: userMsg}]
                })
            });
            const data = await res.json();
            return data.content?.[0]?.text || data.error?.message || 'Errore';
        }
        
        async function callGroq(userMsg) {
            const res = await fetch(GROQ_API, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'llama-3-70b-8192',
                    messages: [...messages, {role: 'user', content: userMsg}],
                    max_tokens: 1024
                })
            });
            const data = await res.json();
            return data.choices?.[0]?.message?.content || data.error?.message || 'Errore';
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) return;
            
            addMessage(content, true);
            input.value = '';
            showTyping();
            
            try {
                let response;
                messages.push({role: 'user', content});
                
                if (apiKey) {
                    if (apiKey.startsWith('sk-ant-')) {
                        response = await callAnthropic(content);
                    } else if (apiKey.startsWith('gsk_')) {
                        response = await callGroq(content);
                    } else {
                        response = await callAnthropic(content);
                    }
                } else {
                    const lower = content.toLowerCase();
                    if (lower.includes('azione') || lower.includes('stock')) response = responses['stock'];
                    else if (lower.includes('valut') || lower.includes('dcf')) response = responses['dcf'];
                    else if (lower.includes('rischio') || lower.includes('risk')) response = responses['risk'];
                    else if (lower.includes('tecnica')) response = responses['technical'];
                    else if (lower.includes('portafoglio') || lower.includes('portfolio')) response = responses['portfolio'];
                    else if (lower.includes('earning') || lower.includes('utili')) response = responses['earnings'];
                    else if (lower.includes('dividendo')) response = responses['dividend'];
                    else if (lower.includes('macro')) response = responses['macro'];
                    else response = "Scrivi cosa ti serve o usa i pulsanti sopra!";
                }
                
                hideTyping();
                addMessage(response, false);
                messages.push({role: 'assistant', content: response});
            } catch (e) {
                hideTyping();
                addMessage("Errore: " + e.message, false);
            }
        }
        
        function useTool(tool) {
            addMessage(`Tool: ${tool.toUpperCase()}`, true);
            setTimeout(() => addMessage(responses[tool]), 500);
        }
        
        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
        init();
    </script>
</body>
</html>
