name: ClawApp
options:
  bundleIdPrefix: com.clawcode
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: "NO"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

packages:
  ClawSDKWrapper:
    path: .   # references ios-app/Package.swift (ClawSDKWrapper product)

targets:
  ClawApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/ClawApp
    info:
      path: Sources/ClawApp/Info.plist
      properties:
        CFBundleDisplayName: Claw
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clawcode.ClawApp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: ClawSDKWrapper
        product: ClawSDKWrapper
    scheme:
      testTargets: []
